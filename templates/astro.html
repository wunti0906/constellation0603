<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流星占星 | 每日星座運勢搜尋</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #201a30 50%, #0f0c1b 100%);
            --panel-bg: rgba(255, 255, 255, 0.04);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-gold: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f5f5f7;
            --text-muted: #aaa7bc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', 'Noto Serif TC', serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景裝飾星光 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.2;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 1;
            transition: all 0.4s ease;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .search-box form {
            display: flex;
            gap: 12px;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            padding: 15px 20px;
            border-radius: 14px;
            font-size: 16px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(0, 0, 0, 0.3);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #c5a028 0%, #9a7b1c 100%);
            color: #0f0c1b;
            border: none;
            padding: 0 25px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #d4af37 0%, #a88722 100%);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 35px;
            border-top: 1px solid var(--panel-border);
            padding-top: 30px;
            animation: fadeIn 0.6s ease forwards;
        }

        .fortune-card {
            background: rgba(212, 175, 55, 0.02);
            border: 1px dashed rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 25px;
            position: relative;
        }

        .fortune-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fortune-title::before {
            content: '✦';
            font-size: 16px;
            color: var(--accent-gold);
        }

        .fortune-content {
            font-size: 15px;
            line-height: 1.8;
            color: rgba(245, 245, 247, 0.9);
            letter-spacing: 0.5px;
            white-space: pre-line;
        }

        .error-msg {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.2);
            padding: 15px 20px;
            border-radius: 14px;
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h2 { font-size: 24px; }
            .search-box form { flex-direction: column; }
            input[type="submit"] { padding: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>每日星座運勢搜尋</h2>
            <div class="subtitle">Horoscope Insights</div>
        </header>

        <div class="search-box">
            <form action="/" method="POST">
                <input type="text" name="keyword" placeholder="輸入星座（如：雙子、處女）..." value="{{ keyword }}" required autocomplete="off">
                <input type="submit" value="探索運勢">
            </form>
        </div>

        {% if keyword %}
            <div class="result-container">
                {% if fortune %}
                    <div class="fortune-card">
                        <div class="fortune-title">{{ keyword }}</div>
                        <div class="fortune-content">
                            {{ fortune }}
                        </div>
                    </div>
                {% else %}
                    <div class="error-msg">
                        ✦ 找不到「{{ keyword }}」的運勢。<br>請檢查輸入是否正確（例如：雙子、天秤）。
                    </div>
                {% endif %}
            </div>
        {% endif %}
    </div>

</body>
</html>
